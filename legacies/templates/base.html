{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oromo Legacy Wall</title>

  <link rel="stylesheet" href="{% static 'style.css' %}?v=6">
</head>

<body>

  <!-- Global background for every page -->
  <div class="page-bg" style="--bg:url('{% static 'legacies/img/bosonafinal.jpg' %}');">
    <div class="page-bg__overlay"></div>

    <!-- Header stays on top -->
    <header class="top">
      <div class="wrap">
        {% block header_brand %}
          <a href="{% url 'home' %}" class="brand-link">
            <img
              src="{% static 'legacies/img/oromo-legacy-wall-logo.png' %}"
              alt="Oromo Legacy Wall"
              class="brand-logo"
            >
            <span class="brand-text">Oromo Legacy Wall</span>
          </a>
        {% endblock %}
      </div>
    </header>

    <!-- Optional hero / top area for pages that want it -->
    {% block page_top %}{% endblock %}

    <!-- White surface for page content -->
    <main class="wrap content-surface">

      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="alert {{ message.tags }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}

    </main>

  </div>

</body>
</html>
